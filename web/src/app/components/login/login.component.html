<div class="login-wrap">
    <div class="login-card">
        <h1>RBAC <span>Demo</span></h1>
        <p class="subtitle">Ingresá con uno de los usuarios de prueba</p>

        <div class="quick-btns">
            <button (click)="quickLogin('bob@test.com')">Bob · admin</button>
            <button (click)="quickLogin('charlie@test.com')">Charlie · editor</button>
            <button (click)="quickLogin('dana@test.com')">Dana · viewer</button>
        </div>

        <div class="divider">o ingresá manualmente</div>

        <input [(ngModel)]="email" placeholder="Email" type="email" />
        <input [(ngModel)]="password" placeholder="Password" type="password" />

        @if (error()) {
        <div class="error">{{ error() }}</div>
        }

        <button class="submit" (click)="login()">Ingresar</button>
    </div>
</div>
