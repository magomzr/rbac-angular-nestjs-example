name: Performance

on:
  workflow_run:
    workflows: [API]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  k6:
    name: k6 Stress Test
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml

      - name: Install & build API
        working-directory: api
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Start API
        working-directory: api
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: test
        run: node dist/main &

      - name: Wait for API
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6
        uses: grafana/run-k6-action@v1
        with:
          path: performance/index.k6.js
          # setup() hace el login internamente — no se pasan tokens
          flags: --env BASE_URL=http://localhost:3000

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.run_number }}
          path: performance/summary.json
          retention-days: 30
